<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#c2f0ff,#d4ffd6);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.info{
background:white;
padding:10px 20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin-bottom:10px;
}

canvas{
background:#a8e6cf;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="info">
⭐ スターを集めて！鬼から逃げよう！（Enterでやり直し）
</div>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const tile=40;
const W=15;
const H=10;

let player, oni, star, map;
let score, gameOver, lastMove;

// 初期化
function init(){

player={x:0,y:0};
oni={x:14,y:9};
score=0;
gameOver=false;
lastMove=Date.now();

// マップ生成
map=Array.from({length:H},()=>Array(W).fill(0));

for(let i=0;i<25;i++){
let x=Math.floor(Math.random()*W);
let y=Math.floor(Math.random()*H);

if((x===0 && y===0)||(x===14 && y===9)) continue;

map[y][x]=1;
}

// スター
star=spawnStar();

draw();
}

function spawnStar(){
while(true){
let x=Math.floor(Math.random()*W);
let y=Math.floor(Math.random()*H);
if(map[y][x]===0) return {x,y};
}
}

document.addEventListener("keydown",e=>{

// リスタート
if(gameOver && e.key==="Enter"){
init();
return;
}

if(gameOver) return;

let nx=player.x;
let ny=player.y;

if(e.key==="ArrowUp")ny--;
if(e.key==="ArrowDown")ny++;
if(e.key==="ArrowLeft")nx--;
if(e.key==="ArrowRight")nx++;

if(nx>=0 && nx<W && ny>=0 && ny<H){
if(map[ny][nx]===0){
player.x=nx;
player.y=ny;
lastMove=Date.now();
}
}

checkStar();
draw();

});

function checkStar(){
if(player.x===star.x && player.y===star.y){
score++;
star=spawnStar();
}
}

function moveOni(){

if(gameOver) return;

let dx=player.x-oni.x;
let dy=player.y-oni.y;

let nx=oni.x;
let ny=oni.y;

if(Math.abs(dx)>Math.abs(dy)){
if(map[oni.y][oni.x+(dx>0?1:-1)]===0){
nx+=dx>0?1:-1;
}else if(map[oni.y+(dy>0?1:-1)] && map[oni.y+(dy>0?1:-1)][oni.x]===0){
ny+=dy>0?1:-1;
}
}else{
if(map[oni.y+(dy>0?1:-1)] && map[oni.y+(dy>0?1:-1)][oni.x]===0){
ny+=dy>0?1:-1;
}else if(map[oni.y][oni.x+(dx>0?1:-1)]===0){
nx+=dx>0?1:-1;
}
}

oni.x=nx;
oni.y=ny;

if(player.x===oni.x && player.y===oni.y){
gameOver=true;
}

draw();

}

setInterval(moveOni,300);

function checkStop(){
if(gameOver) return;

if(Date.now()-lastMove>3000){
gameOver=true;
}
}
setInterval(checkStop,100);

function draw(){

ctx.clearRect(0,0,600,400);

// 地面・障害物
for(let y=0;y<H;y++){
for(let x=0;x<W;x++){

if(map[y][x]===0){
ctx.fillStyle="#a8e6cf";
ctx.fillRect(x*tile,y*tile,tile,tile);
}else{
ctx.fillStyle="#888";
ctx.beginPath();
ctx.arc(x*tile+20,y*tile+20,14,0,Math.PI*2);
ctx.fill();
}

}
}

// スター
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(star.x*tile+20,star.y*tile+20,10,0,Math.PI*2);
ctx.fill();

// プレイヤー
ctx.fillStyle="#4da6ff";
ctx.beginPath();
ctx.arc(player.x*tile+20,player.y*tile+20,12,0,Math.PI*2);
ctx.fill();

// 鬼
ctx.fillStyle="#ff5a5a";
ctx.beginPath();
ctx.arc(oni.x*tile+20,oni.y*tile+20,12,0,Math.PI*2);
ctx.fill();

// スコア
ctx.fillStyle="black";
ctx.font="16px sans-serif";
ctx.fillText("Score: "+score,10,20);

// ゲームオーバー表示
if(gameOver){
ctx.fillStyle="rgba(0,0,0,0.5)";
ctx.fillRect(0,0,600,400);

ctx.fillStyle="white";
ctx.font="30px sans-serif";
ctx.fillText("GAME OVER",200,180);

ctx.font="18px sans-serif";
ctx.fillText("Enterでやり直し",220,220);
}

}

// 最初に開始
init();

</script>

</body>
</html>
